name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (with LFS)
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install build tools
        run: |
          sdkmanager "build-tools;36.0.0" "platforms;android-36" --sdk_root=$ANDROID_SDK_ROOT

      - name: Grant Gradle execute permission
        run: chmod +x toolbox/gradlew

      - name: Build Toolbox APK
        working-directory: toolbox
        run: ./gradlew assembleRelease

      - name: Sign APK
        run: |
          keytool -genkeypair \
            -keystore debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"
          $ANDROID_SDK_ROOT/build-tools/36.0.0/apksigner sign \
            --ks debug.keystore \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out HyperOS3_Toolbox_v305.apk \
            toolbox/app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Get version
        id: version
        run: |
          VERSION=$(grep "versionName" toolbox/app/build.gradle | sed 's/.*versionName "\(.*\)"/\1/' | tr -d ' ')
          # Strip OS3.0 prefix and convert last dot to dash → "305.0-WPACNXM"
          SHORT=$(echo "$VERSION" | sed 's/^OS3\.0\.//' | sed 's/\.\([A-Z][A-Z0-9]*\)$/-\1/')
          SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
          TAG="v${SHORT}-${SHA}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "toolbox_apk=HyperOS3_Toolbox_${TAG}.apk" >> $GITHUB_OUTPUT

      - name: Rename Toolbox APK
        run: mv HyperOS3_Toolbox_v305.apk "${{ steps.version.outputs.toolbox_apk }}"

      - name: Package module ZIP
        run: |
          find . -name "._*" -delete
          zip -r HyperOS3EULocalization-${{ steps.version.outputs.version }}.zip . \
            --exclude "./.git*" \
            --exclude "./toolbox/*" \
            --exclude "./.github/*" \
            --exclude "*/.DS_Store" \
            --exclude "*/._*"

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --latest \
            --title "HyperOS3 EU Localization ${{ steps.version.outputs.version }}" \
            --notes "## HyperOS 3 EU Localization — nezha (Xiaomi 17 Ultra)

          ### 功能 / Features
          - 国行相册 v5.0（Flutter 架构，宠物相册 / 春节特效 / 证件照）
          - 国行相册编辑器 v4.2.5
          - MiPush CN 区推送支持
          - 小爱同学、负一屏、短信、传送门、黄页、通讯录
          - 小米钱包 / MiPay / 日历 / 天气 / 音乐 / 录音机

          ### 刷入说明 / Flash Instructions
          1. 通过 Magisk / KernelSU 刷入 \`.zip\`
          2. 按音量键提示选择需要的功能
          3. 安装 \`${{ steps.version.outputs.toolbox_apk }}\`，在 LSPosed 中启用并勾选相关应用
          4. 重启设备

          ### 文件说明 / Files
          | 文件 | 说明 |
          |------|------|
          | \`HyperOS3EULocalization-*.zip\` | Magisk/KernelSU 刷机包 |
          | \`${{ steps.version.outputs.toolbox_apk }}\` | Xposed 签名绕过模块 |

          > 构建于 $(date +'%Y-%m-%d %H:%M UTC') · commit \`${GITHUB_SHA::7}\`" \
            HyperOS3EULocalization-${{ steps.version.outputs.version }}.zip \
            "${{ steps.version.outputs.toolbox_apk }}"

      - name: Prune old releases (keep latest 3)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Keep newest 3 releases, delete the rest (plus their git tags)
          gh release list --limit 100 --json tagName,createdAt --jq 'sort_by(.createdAt) | reverse | .[3:] | .[].tagName' \
            | while read tag; do
                [ -z "$tag" ] && continue
                echo "Deleting old release: $tag"
                gh release delete "$tag" --yes --cleanup-tag || true
              done
